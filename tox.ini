[flake8]
exclude = .git, *migrations*, .tox, dist, htmlcov
max-line-length = 88
select = C,E,F,W,B,B950
ignore = E203, E231, E501, W503, W291, W293

[tox]
envlist = {py38, py39, py310, py311}-django{40, 42}

[testenv]
setenv =
    DJANGO_SETTINGS_MODULE = testauth.settings.local

deps=
    !django42: allianceauth<4
    django42: allianceauth>=4.0.0a4
    coverage

commands_pre=
    pip list

commands=
    coverage run runtests.py buybackprogram -v 2
    coverage xml
    coverage report -m

[testenv:pylint]
deps=
    pylint
    pylint-django

commands=
    pylint --load-plugins pylint_django buybackprogram
